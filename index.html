<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Princi Weds Abhishek</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Playfair Display', serif;
}

/* 🌸 LIGHT BACKGROUND */
body{
  background: linear-gradient(135deg,#fffafc,#fff3e6);
  overflow-x:hidden;
}

/* 💫 SPLASH SCREEN */
#splash{
  height:100vh;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background: linear-gradient(135deg,#fff,#fff7ed);
  text-align:center;
}

.ganesh{
  width:120px;
  margin-bottom:20px;
  animation: float 3s ease-in-out infinite;
}

.title{
  font-size:32px;
  color:#b48a2c;
  font-family:'Great Vibes', cursive;
}

.date{
  margin:10px 0 25px;
  font-size:18px;
  color:#555;
}

.enter-btn{
  padding:12px 25px;
  border:none;
  background:linear-gradient(45deg,#d4af37,#f5e6a8);
  color:#000;
  font-weight:bold;
  border-radius:30px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.enter-btn:hover{
  transform:scale(1.05);
}

/* 💍 MAIN HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:40px;
  color:#b48a2c;
  font-family:'Great Vibes', cursive;
}

.hero h2{
  font-size:20px;
  color:#444;
}

.hero p{
  margin-top:10px;
  color:#666;
}

/* ✨ FLOAT ANIMATION */
@keyframes float{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0px);}
}
</style>
</head>

<body>

<!-- 🌸 SPLASH -->
<div id="splash">
  <img class="ganesh" src="https://i.imgur.com/8Km9tLL.png" />
  <div class="title">Princi Weds Abhishek</div>
  <div class="date">2 February 2027</div>

  <button class="enter-btn" onclick="enterSite()">
    Enter Invitation 💌
  </button>
</div>

<!-- 💍 MAIN -->
<div id="main" style="display:none;">
  <section class="hero">
    <div>
      <h2>You Are Invited</h2>
      <h1>Princi & Abhishek</h1>
      <p>A Beautiful Beginning of Forever 💖</p>
    </div>
  </section>
</div>

<script>
function enterSite(){
  document.getElementById("splash").style.display="none";
  document.getElementById("main").style.display="block";
}
</script>

</body>
</html>
